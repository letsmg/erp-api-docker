version: '3.8'

services:
  # Main Laravel API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erp-api-gateway
    ports:
      - "8000:80"
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    environment:
      - APP_NAME=ERP API
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=mongodb
      - DB_HOST=mongodb
      - DB_PORT=27017
      - DB_DATABASE=erp_api
      - DB_USERNAME=root
      - DB_PASSWORD=rootpassword
    networks:
      - erp-network
    depends_on:
      - auth-service
      - client-service
      - product-service
      - user-service
      - sale-service
      - mongodb
      - redis
    restart: unless-stopped

  # Auth Module Service
  auth-service:
    build:
      context: ./app/Modules/Auth
      dockerfile: Dockerfile
    container_name: erp-auth-service
    ports:
      - "9001:9001"
    volumes:
      - ./app/Modules/Auth:/var/www/auth
    environment:
      - SERVICE_NAME=auth
      - SERVICE_PORT=9001
    networks:
      - erp-network
    restart: unless-stopped

  # Client Module Service
  client-service:
    build:
      context: ./app/Modules/Client
      dockerfile: Dockerfile
    container_name: erp-client-service
    ports:
      - "9002:9002"
    volumes:
      - ./app/Modules/Client:/var/www/client
    environment:
      - SERVICE_NAME=client
      - SERVICE_PORT=9002
    networks:
      - erp-network
    restart: unless-stopped

  # Product Module Service
  product-service:
    build:
      context: ./app/Modules/Product
      dockerfile: Dockerfile
    container_name: erp-product-service
    ports:
      - "9003:9003"
    volumes:
      - ./app/Modules/Product:/var/www/product
    environment:
      - SERVICE_NAME=product
      - SERVICE_PORT=9003
    networks:
      - erp-network
    restart: unless-stopped

  # User Module Service
  user-service:
    build:
      context: ./app/Modules/User
      dockerfile: Dockerfile
    container_name: erp-user-service
    ports:
      - "9004:9004"
    volumes:
      - ./app/Modules/User:/var/www/user
    environment:
      - SERVICE_NAME=user
      - SERVICE_PORT=9004
    networks:
      - erp-network
    restart: unless-stopped

  # Sale Module Service
  sale-service:
    build:
      context: ./app/Modules/Sale
      dockerfile: Dockerfile
    container_name: erp-sale-service
    ports:
      - "9005:9005"
    volumes:
      - ./app/Modules/Sale:/var/www/sale
    environment:
      - SERVICE_NAME=sale
      - SERVICE_PORT=9005
    networks:
      - erp-network
    restart: unless-stopped

  # Database (SQLite is file-based, but we can add MySQL if needed)
  # Uncomment if you prefer MySQL over SQLite
  # mysql:
  #   image: mysql:8.0
  #   container_name: erp-mysql
  #   ports:
  #     - "3306:3306"
  #   environment:
  #     MYSQL_ROOT_PASSWORD: root
  #     MYSQL_DATABASE: erp_api
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #   networks:
  #     - erp-network
  #   restart: unless-stopped

  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: erp-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootpassword
      MONGO_INITDB_DATABASE: erp_api
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongodb/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - erp-network
    restart: unless-stopped

  # Redis for caching and sessions
  redis:
    image: redis:7-alpine
    container_name: erp-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/etc/redis/redis.conf:ro
    command: redis-server /etc/redis/redis.conf
    networks:
      - erp-network
    restart: unless-stopped

  # Nginx Load Balancer (optional, for production)
  nginx-lb:
    image: nginx:alpine
    container_name: erp-nginx-lb
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx-lb/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx-lb/conf.d:/etc/nginx/conf.d
    networks:
      - erp-network
    depends_on:
      - api-gateway
    restart: unless-stopped
    profiles:
      - production

networks:
  erp-network:
    driver: bridge

volumes:
  mysql_data:
  mongodb_data:
  redis_data:
